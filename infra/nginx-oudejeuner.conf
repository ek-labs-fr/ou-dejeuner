# nginx server block for oudejeuner.com on the EC2 origin.
#
# Place at /etc/nginx/conf.d/oudejeuner.conf and reload nginx.
#
# TLS termination uses a Cloudflare Origin CA certificate:
#   /etc/ssl/oudejeuner/origin.pem
#   /etc/ssl/oudejeuner/origin.key
# Cloudflare must be set to "Full (strict)" SSL/TLS mode.
#
# The Security Group should restrict :443 to Cloudflare's IP ranges so
# nothing reaches this server bypassing the proxy:
#   https://www.cloudflare.com/ips-v4
#   https://www.cloudflare.com/ips-v6

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oudejeuner.com www.oudejeuner.com;

    ssl_certificate     /etc/ssl/oudejeuner/origin.pem;
    ssl_certificate_key /etc/ssl/oudejeuner/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 1m;

    # Long-cache Next.js static chunks at the origin too. Cloudflare's edge
    # cache fronts this; the origin headers feed it.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# Reject any non-Cloudflare / non-matching SNI on :443 cleanly.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    ssl_certificate     /etc/ssl/oudejeuner/origin.pem;
    ssl_certificate_key /etc/ssl/oudejeuner/origin.key;
    return 444;
}
